<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>아울렛 재고 현황 | iloom SCM 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#F4F5F7;color:#1F2937}
.iloom-nav{position:sticky;top:0;background:#fff;border-bottom:1px solid #E0E0E0;z-index:1000}
.iloom-nav-inner{max-width:1400px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
.iloom-nav-logo{font-family:Montserrat,'Noto Sans KR',sans-serif;font-weight:700;font-size:22px;color:#c80a1e;text-decoration:none;padding:14px 0;letter-spacing:-0.5px;display:inline-flex;align-items:center}
.iloom-nav-logo .dv{display:inline-block;width:1px;height:14px;background:#E0E0E0;margin:0 10px;vertical-align:middle}
.iloom-nav-logo .sub{font-family:'Noto Sans KR',sans-serif;font-weight:500;font-size:13px;color:#333}
.iloom-nav-tabs{display:flex;flex-wrap:wrap}
.iloom-tab{padding:16px 18px;font-size:13px;color:#666;text-decoration:none;border-bottom:2px solid transparent;font-weight:500;white-space:nowrap}
.iloom-tab:hover{color:#333}
.iloom-tab.active{color:#c80a1e;border-bottom-color:#c80a1e;font-weight:700}
.page-header{background:#fff;border-bottom:1px solid #E5E7EB;padding:20px 24px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.page-header h1{font-size:20px;font-weight:700}
.page-meta{font-size:12px;color:#6B7280;margin-left:auto}
.summary-bar{display:flex;gap:24px;align-items:center;padding:14px 24px;background:#fff;border-bottom:1px solid #E5E7EB;flex-wrap:wrap}
.sum-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.sum-num{font-size:22px;font-weight:700;line-height:1}
.sum-lbl{font-size:11px;color:#6B7280}
.sum-sep{width:1px;height:40px;background:#E5E7EB;margin:0 8px}
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;background:#fff;border-bottom:1px solid #E5E7EB;flex-wrap:wrap}
.search-box{padding:6px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:13px;width:240px;outline:none}
.search-box:focus{border-color:#c80a1e}
.sort-btn{padding:5px 10px;border:1px solid #D1D5DB;background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:#374151}
.sort-btn.active{background:#c80a1e;border-color:#c80a1e;color:#fff}
#resultCount{font-size:12px;color:#6B7280;margin-left:auto}
.result-wrap{padding:24px;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 260px)}
.result-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:clip;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.result-table th{background:#F9FAFB;border-bottom:2px solid #E5E7EB;padding:10px 12px;font-size:12px;font-weight:600;color:#374151;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:3}
.result-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
.main-row:hover{background:#FFFBEB}
.main-row.row-zero td{color:#9ca3af}
.detail-row td{padding:0;background:#F9FAFB}
.detail-inner{padding:12px 24px 16px}
.detail-title{font-size:12px;font-weight:600;color:#6B7280;margin-bottom:8px}
.detail-table{width:100%;border-collapse:collapse;font-size:12px}
.detail-table th{background:#F3F4F6;padding:6px 10px;font-weight:600;color:#374151;text-align:left}
.detail-table td{padding:6px 10px;border-bottom:1px solid #E5E7EB}
.expand-btn{transition:transform .15s}
.expanded .expand-btn{transform:rotate(180deg)}
.qty-free{color:#059669;font-weight:700}
.qty-zero{color:#c80a1e;font-weight:700}
.qty-ok{color:#1d4ed8;font-weight:700}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.badge-disc{background:#fef3c7;color:#b45309}
.code{font-family:Montserrat,ui-monospace,monospace;font-size:12px}
.loading{text-align:center;padding:60px;color:#6B7280;font-size:14px}
.error-msg{text-align:center;padding:40px;color:#c80a1e;font-size:13px}
@media(max-width:700px){.iloom-nav-inner{gap:0}.iloom-tab{padding:10px;font-size:12px}}
</style>
</head>
<body>

<nav class="iloom-nav">
  <div class="iloom-nav-inner">
    <a class="iloom-nav-logo" href="../">iloom<span class="dv"></span><span class="sub">SCM 대시보드</span></a>
    <div class="iloom-nav-tabs">
      <a class="iloom-tab" href="../spec-change/">사양변경</a>
      <a class="iloom-tab active" href="../outlet/">아울렛 재고</a>
      <a class="iloom-tab" href="../discontinued-sku/">단종(단품)</a>
      <a class="iloom-tab" href="../cumulative/">누적재고관리</a>
      <a class="iloom-tab" href="../sku-status/">운영품목 현황</a>
      <a class="iloom-tab" href="../matching/">짝맞추기</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>아울렛 재고 현황</h1>
  <span class="page-meta" id="pageMeta">로딩 중...</span>
</div>

<div class="summary-bar">
  <div class="sum-item"><span class="sum-num" id="sumTotal">-</span><span class="sum-lbl">세트</span></div>
  <div class="sum-item"><span class="sum-num" id="sumAvail" style="color:#2563eb">-</span><span class="sum-lbl">판매가능</span></div>
  <div class="sum-item"><span class="sum-num" id="sumZero" style="color:#c80a1e">-</span><span class="sum-lbl">재고없음</span></div>
  <div class="sum-item"><span class="sum-num" id="sumFree" style="color:#059669">-</span><span class="sum-lbl">제약없음</span></div>
  <div class="sum-sep"></div>
  <div class="sum-item"><span class="sum-num" id="sumTarget">-</span><span class="sum-lbl">목표판매량</span></div>
  <div class="sum-item"><span class="sum-num" id="sumSold">-</span><span class="sum-lbl">판매수량</span></div>
  <div class="sum-item"><span class="sum-num" id="sumRemain">-</span><span class="sum-lbl">잔여수량</span></div>
  <div class="sum-item"><span class="sum-num" id="sumRate">-</span><span class="sum-lbl">달성률</span></div>
</div>

<div class="toolbar">
  <input class="search-box" id="searchBox" type="text" placeholder="세트코드 / 세트명 검색..." oninput="filterTable()">
  <button class="sort-btn active" id="sortDefault" onclick="setSort('default')">기본</button>
  <button class="sort-btn" id="sortQty" onclick="setSort('qty')">판매가능수량</button>
  <button class="sort-btn" id="sortSold" onclick="setSort('sold')">판매수량</button>
  <button class="sort-btn" id="sortRemain" onclick="setSort('remain')">잔여수량</button>
  <span id="resultCount"></span>
</div>

<div class="result-wrap">
  <table class="result-table">
    <thead><tr>
      <th style="width:36px;text-align:center">#</th>
      <th>세트코드</th><th>색상</th><th>세트명</th>
      <th style="text-align:right">목표판매량</th>
      <th style="text-align:right">판매수량</th>
      <th style="text-align:right">잔여수량</th>
      <th style="text-align:center">판매가능수량</th>
      <th style="text-align:center">25년 평출</th>
      <th style="width:28px"></th>
    </tr></thead>
    <tbody id="tableBody">
      <tr><td colspan="10" class="loading">Google Sheets에서 데이터 로딩 중...</td></tr>
    </tbody>
  </table>
</div>

<script>
const SHEET_ID = "1sAvWHksA3hhlDRvGsXqHdbSvO07MFTCrebuVoRk9LSc";

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(name)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);\s*$/, ''));
  if (json.status === 'error') throw new Error(json.errors?.[0]?.message || 'Sheets 오류');
  const cols = json.table.cols.map(c => c.label);
  return (json.table.rows || []).map(row => {
    const obj = {};
    (row.c || []).forEach((cell, i) => { obj[cols[i]] = cell ? (cell.v ?? '') : ''; });
    return obj;
  });
}

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(v) { const n = parseInt(v); return isNaN(n) || v === '' ? '-' : n.toLocaleString('ko-KR'); }
function toInt(v) { const n = parseInt(v); return isNaN(n) ? 0 : n; }

let sets = [], currentSort = 'default';

async function loadData() {
  try {
    const rows = await fetchSheet('아울렛');
    // 시트 컬럼: 기존세트코드, 색상, 기존조합, 아울렛세트코드, 색상_1(아울렛색상), 아울렛조합,
    //           세트명, 목표판매량, 판매수량, 잔여수량, 판매가능수량, 25년 평출,
    //           단품코드, 색상_2(단품색상), 단종예정, 이원화코드, 이원화 코드 유무, 이원화코드 재고 유무, 조합, 단품명

    // 아울렛조합 기준 그룹핑
    const groups = {}, order = [];
    rows.forEach(r => {
      const combo = r['아울렛조합'] || '';
      if (!combo) return;
      if (!groups[combo]) {
        order.push(combo);
        const feas = String(r['판매가능수량'] ?? '');
        groups[combo] = {
          combo,
          setCode:  r['아울렛세트코드'] || '',
          color:    r['색상_1'] || r['색상'] || '',
          name:     r['세트명'] || '',
          target:   toInt(r['목표판매량']),
          sold:     toInt(r['판매수량']),
          remain:   toInt(r['잔여수량']),
          feas:     feas === '제약없음' ? '제약없음' : (feas !== '' ? toInt(feas) : 0),
          avgSale:  r['25년 평출'] || '',
          items: []
        };
      }
      const code = r['단품코드'] || '';
      if (code) {
        groups[combo].items.push({
          code, color: r['색상_2'] || '',
          name: r['단품명'] || '',
          disc: r['단종예정'] || '',
          dual: r['이원화코드'] || '',
          dualYn: r['이원화 코드 유무'] || '',
          dualStock: r['이원화코드 재고 유무'] || ''
        });
      }
    });
    sets = order.map(c => groups[c]);
    document.getElementById('pageMeta').textContent = 'Google Sheets 실시간';
    updateSummary();
    renderTable();
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="10" class="error-msg">로딩 실패: ${esc(e.message)}</td></tr>`;
    document.getElementById('pageMeta').textContent = '로딩 실패';
  }
}

function updateSummary() {
  const total = sets.length;
  const zero  = sets.filter(s => s.feas === 0).length;
  const free  = sets.filter(s => s.feas === '제약없음').length;
  const avail = total - zero;
  const target = sets.reduce((a,s) => a + s.target, 0);
  const sold   = sets.reduce((a,s) => a + s.sold, 0);
  const remain = sets.reduce((a,s) => a + s.remain, 0);
  document.getElementById('sumTotal').textContent  = total;
  document.getElementById('sumAvail').textContent  = avail;
  document.getElementById('sumZero').textContent   = zero;
  document.getElementById('sumFree').textContent   = free;
  document.getElementById('sumTarget').textContent = target.toLocaleString();
  document.getElementById('sumSold').textContent   = sold.toLocaleString();
  document.getElementById('sumRemain').textContent = remain.toLocaleString();
  document.getElementById('sumRate').textContent   = target ? (sold/target*100).toFixed(1)+'%' : '-';
}

function qtyHtml(feas) {
  if (feas === '제약없음') return '<span class="qty-free">제약없음</span>';
  if (feas === 0) return '<span class="qty-zero">0</span>';
  return `<span class="qty-ok">${feas.toLocaleString ? feas.toLocaleString() : feas}</span>`;
}

function renderTable() {
  let sorted = [...sets];
  if (currentSort === 'qty') sorted.sort((a,b) => (b.feas === '제약없음' ? 99999 : b.feas) - (a.feas === '제약없음' ? 99999 : a.feas));
  else if (currentSort === 'sold') sorted.sort((a,b) => b.sold - a.sold);
  else if (currentSort === 'remain') sorted.sort((a,b) => b.remain - a.remain);

  const parts = [];
  sorted.forEach((s, i) => {
    const idx = i + 1;
    const rowCls = s.feas === 0 ? ' row-zero' : '';
    const detItems = s.items.map(it => {
      const discBadge = it.disc === 'Y' ? '<span class="badge badge-disc">단종예정</span>' : '';
      return `<tr>
        <td class="code">${esc(it.code)}</td>
        <td style="text-align:center">${esc(it.color)}</td>
        <td>${esc(it.name)}</td>
        <td style="text-align:center">${discBadge}</td>
        <td class="code">${esc(it.dual)}</td>
        <td style="text-align:center">${it.dualYn === 'Y' ? 'Y' : ''}</td>
        <td style="text-align:center">${it.dualStock === 'Y' ? '있음' : ''}</td>
      </tr>`;
    }).join('');

    const detHtml = `<tr id="det-${idx}" class="detail-row" style="display:none">
      <td colspan="10"><div class="detail-inner">
        <div class="detail-title">구성 단품 (${s.items.length}개)</div>
        <table class="detail-table"><thead><tr>
          <th>단품코드</th><th>색상</th><th>단품명</th><th>단종예정</th>
          <th>이원화코드</th><th>이원화유무</th><th>이원화재고</th>
        </tr></thead><tbody>${detItems}</tbody></table>
      </div></td>
    </tr>`;

    parts.push(`<tr class="main-row${rowCls}" data-idx="${idx}"
        data-setcode="${esc(s.setCode)}" data-name="${esc(s.name)}"
        onclick="toggleDet(${idx},this)" style="cursor:pointer">
      <td style="color:#9ca3af;text-align:center">${idx}</td>
      <td style="font-weight:600" class="code">${esc(s.setCode)}</td>
      <td style="text-align:center">${esc(s.color)}</td>
      <td>${esc(s.name)}</td>
      <td style="text-align:right" data-val="${s.target}">${fmt(s.target) || '-'}</td>
      <td style="text-align:right" data-val="${s.sold}">${fmt(s.sold) || '-'}</td>
      <td style="text-align:right" data-val="${s.remain}">${fmt(s.remain) || '-'}</td>
      <td style="text-align:center" data-val="${s.feas === '제약없음' ? 99999 : s.feas}">${qtyHtml(s.feas)}</td>
      <td style="text-align:center;font-size:11px;color:#6b7280">${esc(s.avgSale)}</td>
      <td style="text-align:center;color:#9ca3af;font-size:11px" class="expand-btn">▼</td>
    </tr>${detHtml}`);
  });
  document.getElementById('tableBody').innerHTML = parts.join('');
  filterTable();
}

function toggleDet(idx, row) {
  const det = document.getElementById('det-'+idx);
  if (!det) return;
  const open = det.style.display !== 'none';
  det.style.display = open ? 'none' : 'table-row';
  row.classList.toggle('expanded', !open);
}

function setSort(mode) {
  currentSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort'+mode.charAt(0).toUpperCase()+mode.slice(1)).classList.add('active');
  renderTable();
}

function filterTable() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let vis = 0;
  document.querySelectorAll('#tableBody .main-row').forEach(row => {
    const m = !q || (row.dataset.setcode||'').toLowerCase().includes(q) || (row.dataset.name||'').toLowerCase().includes(q);
    row.style.display = m ? '' : 'none';
    const det = document.getElementById('det-'+row.dataset.idx);
    if (det && !m) det.style.display = 'none';
    if (m) vis++;
  });
  document.getElementById('resultCount').textContent = q ? `${vis} / ${sets.length} 건` : '';
}

loadData();
</script>
</body>
</html>
