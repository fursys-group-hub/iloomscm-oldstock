<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>단종(단품) 재고 현황 | iloom SCM 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#F4F5F7;color:#1F2937}
.iloom-nav{position:sticky;top:0;background:#fff;border-bottom:1px solid #E0E0E0;z-index:1000}
.iloom-nav-inner{max-width:1400px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
.iloom-nav-logo{font-family:Montserrat,'Noto Sans KR',sans-serif;font-weight:700;font-size:22px;color:#c80a1e;text-decoration:none;padding:14px 0;letter-spacing:-0.5px;display:inline-flex;align-items:center}
.iloom-nav-logo .dv{display:inline-block;width:1px;height:14px;background:#E0E0E0;margin:0 10px;vertical-align:middle}
.iloom-nav-logo .sub{font-family:'Noto Sans KR',sans-serif;font-weight:500;font-size:13px;color:#333}
.iloom-nav-tabs{display:flex;flex-wrap:wrap}
.iloom-tab{padding:16px 18px;font-size:13px;color:#666;text-decoration:none;border-bottom:2px solid transparent;font-weight:500;white-space:nowrap}
.iloom-tab:hover{color:#333}
.iloom-tab.active{color:#c80a1e;border-bottom-color:#c80a1e;font-weight:700}
.page-header{background:#fff;border-bottom:1px solid #E5E7EB;padding:20px 24px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.page-header h1{font-size:20px;font-weight:700}
.page-meta{font-size:12px;color:#6B7280;margin-left:auto}
.update-notice{font-size:11px;color:#6B7280;padding:8px 24px;background:#F9FAFB;border-bottom:1px solid #E5E7EB}
.update-notice b{color:#374151}
.summary-bar{display:flex;gap:24px;align-items:center;padding:14px 24px;background:#fff;border-bottom:1px solid #E5E7EB;flex-wrap:wrap}
.sum-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.sum-num{font-size:22px;font-weight:700;line-height:1}
.sum-lbl{font-size:11px;color:#6B7280}
.sum-sep{width:1px;height:40px;background:#E5E7EB;margin:0 8px}
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;background:#fff;border-bottom:1px solid #E5E7EB;flex-wrap:wrap}
.search-box{padding:6px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:13px;width:240px;outline:none}
.search-box:focus{border-color:#c80a1e}
.filter-btn{padding:5px 10px;border:1px solid #D1D5DB;background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:#374151}
.filter-btn.active{background:#c80a1e;border-color:#c80a1e;color:#fff}
#resultCount{font-size:12px;color:#6B7280;margin-left:auto}
.result-wrap{padding:24px;overflow-x:auto}
.result-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.result-table th{background:#F9FAFB;border-bottom:2px solid #E5E7EB;padding:10px 12px;font-size:12px;font-weight:600;color:#374151;text-align:left;white-space:nowrap}
.result-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
.group-row td{background:#F3F4F6;font-weight:700;font-size:13px;color:#374151;padding:8px 12px;border-top:2px solid #E5E7EB}
.group-meta{font-size:11px;font-weight:400;color:#6B7280;margin-left:8px}
.item-row:hover{background:#FFFBEB}
.item-row.row-zero td{color:#9ca3af}
.code{font-family:Montserrat,ui-monospace,monospace;font-size:12px}
.qty-pos-hi{color:#059669;font-weight:700}
.qty-pos-lo{color:#d97706;font-weight:700}
.qty-zero{color:#c80a1e;font-weight:700}
.qty-neg{color:#c80a1e;font-weight:700}
.loading{text-align:center;padding:60px;color:#6B7280;font-size:14px}
.error-msg{text-align:center;padding:40px;color:#c80a1e;font-size:13px}
.empty-note{text-align:center;padding:60px;color:#6B7280;font-size:13px;line-height:1.8}
@media(max-width:700px){.iloom-nav-inner{gap:0}.iloom-tab{padding:10px;font-size:12px}}
</style>
</head>
<body>

<nav class="iloom-nav">
  <div class="iloom-nav-inner">
    <a class="iloom-nav-logo" href="../">iloom<span class="dv"></span><span class="sub">SCM 대시보드</span></a>
    <div class="iloom-nav-tabs">
      <a class="iloom-tab" href="../spec-change/">사양변경</a>
      <a class="iloom-tab" href="../outlet/">아울렛 재고</a>
      <a class="iloom-tab active" href="../discontinued-sku/">단종(단품)</a>
      <a class="iloom-tab" href="../new-product/">신제품 분석</a>
      <a class="iloom-tab" href="../cumulative/">누적재고관리</a>
      <a class="iloom-tab" href="../supply/">공급량 관리</a>
      <a class="iloom-tab" href="../sku-status/">운영품목 현황</a>
      <a class="iloom-tab" href="../scp/">SCP 실적현황</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>단종(단품) 재고 현황</h1>
  <span class="page-meta" id="pageMeta">로딩 중...</span>
</div>
<div class="update-notice">
  재고 수치는 <b>매시 정각</b> 자동 갱신됩니다 (BigQuery 기준).
  단품 목록은 Google Sheets <b>단종(단품)</b> 시트를 직접 편집하세요.
</div>

<div class="summary-bar">
  <div class="sum-item"><span class="sum-num" id="sumTotal">-</span><span class="sum-lbl">단품</span></div>
  <div class="sum-item"><span class="sum-num" id="sumHas" style="color:#059669">-</span><span class="sum-lbl">재고있음</span></div>
  <div class="sum-item"><span class="sum-num" id="sumZero" style="color:#c80a1e">-</span><span class="sum-lbl">재고없음</span></div>
  <div class="sum-sep"></div>
  <div class="sum-item"><span class="sum-num" id="sumAvail">-</span><span class="sum-lbl">가용재고 합계</span></div>
  <div class="sum-item"><span class="sum-num" id="sumGroups">-</span><span class="sum-lbl">구분</span></div>
</div>

<div class="toolbar">
  <input class="search-box" id="searchBox" type="text" placeholder="단품코드 / 단품명 검색..." oninput="filterTable()">
  <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">전체</button>
  <button class="filter-btn" id="filterHas" onclick="setFilter('has')">재고있음만</button>
  <span id="resultCount"></span>
</div>

<div class="result-wrap">
  <table class="result-table">
    <thead><tr>
      <th>단품코드</th><th>색상</th><th>단품명칭</th>
      <th style="text-align:right">현재고수량</th>
      <th style="text-align:right">입고예정량</th>
      <th style="text-align:right">출고예정량</th>
      <th style="text-align:right">가용재고</th>
      <th style="text-align:right">사업장재고</th>
    </tr></thead>
    <tbody id="tableBody">
      <tr><td colspan="8" class="loading">Google Sheets에서 데이터 로딩 중...</td></tr>
    </tbody>
  </table>
</div>

<script>
const SHEET_ID = "1sAvWHksA3hhlDRvGsXqHdbSvO07MFTCrebuVoRk9LSc";

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);\s*$/, ''));
  if (json.status === 'error') throw new Error(json.errors?.[0]?.message || 'Sheets 오류');
  const cols = json.table.cols.map(c => c.label);
  return (json.table.rows || []).map(row => {
    const obj = {};
    (row.c || []).forEach((cell, i) => { obj[cols[i]] = cell ? (cell.v ?? '') : ''; });
    return obj;
  });
}

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(v) { const n = parseInt(v); return isNaN(n) ? '-' : n.toLocaleString('ko-KR'); }
function toInt(v) { const n = parseInt(v); return isNaN(n) ? 0 : n; }

function availHtml(n) {
  if (n > 10) return `<span class="qty-pos-hi">${n.toLocaleString()}</span>`;
  if (n > 0)  return `<span class="qty-pos-lo">${n.toLocaleString()}</span>`;
  if (n < 0)  return `<span class="qty-neg">${n.toLocaleString()}</span>`;
  return `<span class="qty-zero">0</span>`;
}

let allItems = [], currentFilter = 'all';

async function loadData() {
  try {
    const rows = await fetchSheet('단종재고현황');
    if (!rows.length) {
      document.getElementById('tableBody').innerHTML =
        `<tr><td colspan="8" class="empty-note">
          아직 재고 데이터가 없습니다.<br>
          <b>재고업데이트.bat</b>를 실행하면 데이터가 채워집니다.
        </td></tr>`;
      document.getElementById('pageMeta').textContent = '데이터 없음';
      return;
    }

    allItems = rows.filter(r => r['단품코드']);
    const ts = rows[0]?.['기준일자'] || '';
    document.getElementById('pageMeta').textContent = ts ? `재고기준: ${ts}` : '로드 완료';

    const total  = allItems.length;
    const hasStk = allItems.filter(r => toInt(r['가용재고']) > 0).length;
    const zero   = total - hasStk;
    const sumAvl = allItems.reduce((a,r) => a + Math.max(0, toInt(r['가용재고'])), 0);
    const groups = new Set(allItems.map(r => r['구분'] || '').filter(Boolean));

    document.getElementById('sumTotal').textContent  = total;
    document.getElementById('sumHas').textContent    = hasStk;
    document.getElementById('sumZero').textContent   = zero;
    document.getElementById('sumAvail').textContent  = sumAvl.toLocaleString();
    document.getElementById('sumGroups').textContent = groups.size;

    renderTable();
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="8" class="error-msg">로딩 실패: ${esc(e.message)}</td></tr>`;
    document.getElementById('pageMeta').textContent = '로딩 실패';
  }
}

function renderTable() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const groups = {}, order = [];
  allItems.forEach(r => {
    const g = r['구분'] || '기타';
    const avail = toInt(r['가용재고']);
    const matchQ = !q || (r['단품코드']||'').toLowerCase().includes(q) || (r['단품명칭']||'').toLowerCase().includes(q);
    const matchF = currentFilter === 'all' || avail > 0;
    if (!matchQ || !matchF) return;
    if (!groups[g]) { groups[g] = []; order.push(g); }
    groups[g].push(r);
  });

  if (!order.length) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="8" style="text-align:center;padding:40px;color:#9ca3af;font-size:13px">검색 결과 없음</td></tr>`;
    document.getElementById('resultCount').textContent = `0 / ${allItems.length} 건`;
    return;
  }

  const parts = [];
  let vis = 0;
  order.forEach(g => {
    const items = groups[g];
    const gAvail = items.reduce((a,r) => a + Math.max(0, toInt(r['가용재고'])), 0);
    parts.push(`<tr class="group-row" data-group="${esc(g)}">
      <td colspan="8">${esc(g)}<span class="group-meta">${items.length}개 &nbsp;|&nbsp; 가용 합계 ${gAvail.toLocaleString()}</span></td>
    </tr>`);
    items.forEach(r => {
      const avail = toInt(r['가용재고']);
      vis++;
      parts.push(`<tr class="item-row${avail <= 0 ? ' row-zero' : ''}"
          data-code="${esc(r['단품코드'])}" data-name="${esc(r['단품명칭'])}" data-group="${esc(g)}" data-avail="${avail}">
        <td class="code">${esc(r['단품코드'])}</td>
        <td style="text-align:center">${esc(r['색상'])}</td>
        <td>${esc(r['단품명칭'])}</td>
        <td style="text-align:right">${fmt(r['현재고수량'])}</td>
        <td style="text-align:right">${fmt(r['입고예정량'])}</td>
        <td style="text-align:right">${fmt(r['출고예정량'])}</td>
        <td style="text-align:right">${availHtml(avail)}</td>
        <td style="text-align:right;color:#9ca3af">${fmt(r['사업장재고'])}</td>
      </tr>`);
    });
  });
  document.getElementById('tableBody').innerHTML = parts.join('');
  const total = allItems.filter(r => currentFilter === 'all' || toInt(r['가용재고']) > 0).length;
  document.getElementById('resultCount').textContent = (q || currentFilter !== 'all') ? `${vis} / ${total} 건` : '';
}

function filterTable() { renderTable(); }

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
  renderTable();
}

loadData();
</script>
</body>
</html>
