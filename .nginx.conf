server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 민감 경로 차단
    location ~ /\.git { deny all; }
    location ~ /\. { deny all; }
    location /_apps-script { deny all; }
    location /.fursys-deploy-hub { deny all; }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
