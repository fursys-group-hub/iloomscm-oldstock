<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>사양변경 현황 | iloom SCM 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#F4F5F7;color:#1F2937}
.iloom-nav{position:sticky;top:0;background:#fff;border-bottom:1px solid #E0E0E0;z-index:1000}
.iloom-nav-inner{max-width:1400px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
.iloom-nav-logo{font-family:Montserrat,'Noto Sans KR',sans-serif;font-weight:700;font-size:22px;color:#c80a1e;text-decoration:none;padding:14px 0;letter-spacing:-0.5px;display:inline-flex;align-items:center}
.iloom-nav-logo .dv{display:inline-block;width:1px;height:14px;background:#E0E0E0;margin:0 10px;vertical-align:middle}
.iloom-nav-logo .sub{font-family:'Noto Sans KR',sans-serif;font-weight:500;font-size:13px;color:#333}
.iloom-nav-tabs{display:flex;flex-wrap:wrap}
.iloom-tab{padding:16px 18px;font-size:13px;color:#666;text-decoration:none;border-bottom:2px solid transparent;font-weight:500;white-space:nowrap}
.iloom-tab:hover{color:#333}
.iloom-tab.active{color:#c80a1e;border-bottom-color:#c80a1e;font-weight:700}
.page-header{background:#fff;border-bottom:1px solid #E5E7EB;padding:18px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.page-header h1{font-size:20px;font-weight:700}
.page-meta{font-size:12px;color:#6B7280;margin-left:auto}
.summary-bar{display:flex;gap:20px;align-items:center;padding:12px 24px;background:#fff;border-bottom:1px solid #E5E7EB;flex-wrap:wrap}
.sum-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.sum-num{font-size:20px;font-weight:700;line-height:1}
.sum-lbl{font-size:11px;color:#6B7280}
.sum-sep{width:1px;height:36px;background:#E5E7EB;margin:0 4px}
.toolbar{display:flex;align-items:center;gap:10px;padding:10px 24px;background:#fff;border-bottom:1px solid #E5E7EB;flex-wrap:wrap}
.search-box{padding:6px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:13px;width:260px;outline:none}
.search-box:focus{border-color:#c80a1e}
#resultCount{font-size:12px;color:#6B7280;margin-left:auto}
.result-wrap{padding:20px 24px;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 240px)}
.result-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:clip;box-shadow:0 1px 3px rgba(0,0,0,.08);min-width:1100px}
.result-table th{background:#F9FAFB;border-bottom:2px solid #E5E7EB;padding:8px 10px;font-size:11px;font-weight:600;color:#374151;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:3}
.result-table thead tr:nth-child(2) th{top:29px}
.result-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
.th-group-old{background:#FEF9EC;border-bottom-color:#FDE68A}
.th-group-new{background:#EFF6FF;border-bottom-color:#BFDBFE}
.group-row td{background:#F3F4F6;font-weight:700;font-size:13px;color:#1F2937;padding:8px 12px;border-top:2px solid #E5E7EB}
.group-meta{font-size:11px;font-weight:400;color:#6B7280;margin-left:8px}
.item-row:hover{background:#FFFBEB}
.code{font-family:Montserrat,ui-monospace,monospace;font-size:11px}
.badge-use{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;background:#d1fae5;color:#065f46}
.badge-disc{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;background:#fde2e4;color:#c80a1e}
.badge-etc{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;color:#6B7280}
.qty-pos{color:#059669;font-weight:700}
.qty-zero{color:#c80a1e;font-weight:700}
.qty-neg{color:#c80a1e;font-weight:700}
.divider-col{background:#F3F4F6;width:28px;text-align:center;color:#9ca3af;font-size:16px;padding:0 2px}
.loading{text-align:center;padding:60px;color:#6B7280;font-size:14px}
.error-msg{text-align:center;padding:40px;color:#c80a1e;font-size:13px}
@media(max-width:700px){.iloom-nav-inner{gap:0}.iloom-tab{padding:10px;font-size:12px}}
/* Auth */.auth-hide{display:none}.nav-auth{margin-left:auto;display:flex;align-items:center;gap:8px;padding:0 4px}.btn-nav-login{padding:5px 14px;background:#c80a1e;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer}.btn-nav-login:hover{background:#a50818}.btn-nav-logout{padding:5px 12px;background:#F3F4F6;color:#374151;border:1px solid #D1D5DB;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer}.btn-nav-logout:hover{background:#E5E7EB}.nav-user-chip{font-size:11px;color:#6B7280;background:#F3F4F6;padding:3px 9px;border-radius:10px;font-weight:600}
</style>

<body>

  <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px">
    <div style="font-size:48px">🔒</div>

    <button onclick="showLoginModal()" style="padding:12px 32px;background:#c80a1e;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">EP ID로 로그인</button>

<div id="loginModal" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:none;align-items:center;justify-content:center" onclick="if(event.target===this)hideLoginModal()">
  <div style="background:#fff;border-radius:12px;padding:32px 36px;min-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.18);display:flex;flex-direction:column;gap:16px">
    <h3 style="font-size:17px;font-weight:700;color:#1F2937">로그인</h3>

    <input id="loginInput" type="text" placeholder="EP ID" autocomplete="off"
           style="padding:10px 14px;border:1px solid #D1D5DB;border-radius:7px;font-size:14px;outline:none;width:100%;font-family:inherit"
           onkeydown="if(event.key==='Enter')doLogin()">
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#6B7280;cursor:pointer;margin-top:-4px"><input type="checkbox" id="saveIdChk" style="cursor:pointer"> ID 저장</label>
    <div id="loginError" style="font-size:12px;color:#c80a1e;min-height:16px"></div>

      <button onclick="doLogin()" style="padding:8px 22px;background:#c80a1e;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">로그인</button>
    </div>

</div>

<nav class="iloom-nav">
  <div class="iloom-nav-inner">
    <a class="iloom-nav-logo" href="../">iloom<span class="dv"></span><span class="sub">SCM 대시보드</span></a>
    <div class="iloom-nav-tabs">
      <a class="iloom-tab active auth-hide" href="../spec-change/">사양변경</a>

</div>

<div class="summary-bar">
  <div class="sum-item"><span class="sum-num" id="sumGroups">-</span><span class="sum-lbl">변경 건</span></div>
  <div class="sum-sep"></div>
  <div class="sum-item"><span class="sum-num" id="sumPairs">-</span><span class="sum-lbl">코드쌍</span></div>
  <div class="sum-item"><span class="sum-num" id="sumOldStock" style="color:#d97706">-</span><span class="sum-lbl">구사양 재고있음</span></div>
  <div class="sum-item"><span class="sum-num" id="sumNewStock" style="color:#2563eb">-</span><span class="sum-lbl">신사양 재고있음</span></div>
</div>

<div class="toolbar">
  <input class="search-box" id="searchBox" type="text" placeholder="사양변경내용 / 코드 / 단품명 검색..." oninput="filterTable()">

</div>

<div class="result-wrap">
  <table class="result-table">
    <thead>
      <tr>
        <th rowspan="2">단품명칭</th>
        <th rowspan="2">구사양코드</th>
        <th rowspan="2" style="text-align:center">→</th>
        <th rowspan="2">신사양코드</th>
        <th rowspan="2">색상</th>
        <th colspan="6" class="th-group-old" style="text-align:center">구사양</th>
        <th colspan="6" class="th-group-new" style="text-align:center">신사양</th>
        <th rowspan="2" style="text-align:center">문서</th>
        <th rowspan="2" style="text-align:center">완료</th>
      </tr>
      <tr>
        <th class="th-group-old">사용구분</th>
        <th class="th-group-old" style="text-align:right">현재고</th>
        <th class="th-group-old" style="text-align:right">입고예정</th>
        <th class="th-group-old" style="text-align:right">출고예정</th>
        <th class="th-group-old" style="text-align:right">가용재고</th>
        <th class="th-group-old" style="text-align:right">사업장가용</th>
        <th class="th-group-new">사용구분</th>
        <th class="th-group-new" style="text-align:right">현재고</th>
        <th class="th-group-new" style="text-align:right">입고예정</th>
        <th class="th-group-new" style="text-align:right">출고예정</th>
        <th class="th-group-new" style="text-align:right">가용재고</th>
        <th class="th-group-new" style="text-align:right">사업장가용</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="19" class="loading">Google Sheets에서 데이터 로딩 중...</td></tr>
    </tbody>
  </table>
</div>

<script>
const SHEET_ID = "1sAvWHksA3hhlDRvGsXqHdbSvO07MFTCrebuVoRk9LSc";

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxD11tQrCBou3cjIVfrvaS1HA3kmzn9TuKmX6FImU2EGYyAKQ9WdfIRSSwjWrF00uaTBQ/exec';

// P열까지가 고정 컬럼 — Q열 이후 사용자 정의 컬럼(전자문서 등) 동적 감지
const FIXED_COLS = new Set(['구사양코드','신사양코드','색상','사양변경내용',
  '단품명칭','구사양사용구분','신사양사용구분',
  '구현재고','구입고예정','구출고예정','구가용재고','구사양사업장가용재고',
  '신현재고','신입고예정','신출고예정','신가용재고','신사양사업장가용재고',
  '기준일자','완료여부']);

function findDocCol(row) {
  return Object.keys(row).find(k => !FIXED_COLS.has(k) && k.trim() !== '') || '전자문서';
}

function handleDone_spec(btn) {
  const oc = btn.dataset.oc, nc = btn.dataset.nc, color = btn.dataset.color;
  if (!confirm(`완료 처리하시겠습니까?\n\n${oc} → ${nc} (${color})\n\n구글시트에 기록되고 목록에서 사라집니다.`)) return;
  allRows = allRows.filter(r => !(r['구사양코드']===oc && r['신사양코드']===nc && r['색상']===color));
  renderTable(allRows);
  fetch(APPS_SCRIPT_URL, {method:'POST', mode:'no-cors',
    body: JSON.stringify({sheet:'사양변경', keys:[{col:'구사양코드',val:oc},{col:'신사양코드',val:nc},{col:'색상',val:color}]})});
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(name)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);\s*$/, ''));
  if (json.status === 'error') throw new Error(json.errors?.[0]?.message || 'Sheets 오류');
  const cols = json.table.cols.map(c => c.label);
  return (json.table.rows || []).map(row => {
    const obj = {};
    (row.c || []).forEach((cell, i) => { obj[cols[i]] = cell ? (cell.v ?? '') : ''; });
    return obj;
  });
}

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(v) { const n = parseInt(v); return (isNaN(n) || v === '') ? '-' : n.toLocaleString('ko-KR'); }

function qtyHtml(v) {
  if (v === '' || v === null || v === undefined) return '<span style="color:#d1d5db">-</span>';
  const n = parseInt(v);
  if (isNaN(n)) return '<span style="color:#d1d5db">-</span>';
  if (n > 0) return `<span class="qty-pos">${n.toLocaleString()}</span>`;
  if (n < 0) return `<span class="qty-neg">${n.toLocaleString()}</span>`;
  return `<span class="qty-zero">0</span>`;
}

function usageBadge(v) {
  if (!v) return '<span style="color:#d1d5db">-</span>';
  if (v === '사용') return `<span class="badge-use">사용</span>`;
  if (v.includes('단종')) return `<span class="badge-disc">${esc(v)}</span>`;
  return `<span class="badge-etc">${esc(v)}</span>`;
}

let allRows = [];

async function loadData() {
  try {
    const rows = await fetchSheet('사양변경');
    allRows = rows.filter(r => (r['구사양코드'] || r['신사양코드']) && r['완료여부'] !== '완료');

    const hasInventory = allRows.length && '구현재고' in allRows[0];
    const refDate = hasInventory && allRows[0]['기준일자'] ? allRows[0]['기준일자'] : '';
    document.getElementById('pageMeta').textContent = refDate
      ? `재고기준: ${refDate}`
      : hasInventory ? '재고기준: 최신' : 'Google Sheets 실시간 (재고 미갱신)';

    const groups = new Set(allRows.map(r => r['사양변경내용'] || '').filter(Boolean));
    const oldStk = allRows.filter(r => parseInt(r['구가용재고'] ?? 0) > 0).length;
    const newStk = allRows.filter(r => parseInt(r['신가용재고'] ?? 0) > 0).length;
    document.getElementById('sumGroups').textContent = groups.size;
    document.getElementById('sumPairs').textContent = allRows.length;
    document.getElementById('sumOldStock').textContent = oldStk;
    document.getElementById('sumNewStock').textContent = newStk;

    renderTable(allRows);
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="13" class="error-msg">로딩 실패: ${esc(e.message)}</td></tr>`;
    document.getElementById('pageMeta').textContent = '로딩 실패';
  }
}

function renderTable(rows) {
  const groups = {}, order = [];
  rows.forEach(r => {
    const g = r['사양변경내용'] || '(미분류)';
    if (!groups[g]) { groups[g] = []; order.push(g); }
    groups[g].push(r);
  });

  const parts = [];
  order.forEach(g => {
    const items = groups[g];
    parts.push(`<tr class="group-row" data-group="${esc(g)}">
      <td colspan="19">${esc(g)}<span class="group-meta">${items.length}건</span></td></tr>`);
    const docCol = allRows.length ? findDocCol(allRows[0]) : '전자문서';
    items.forEach(r => {
      const oc = r['구사양코드'] || '', nc = r['신사양코드'] || '';
      const docUrl = (r[docCol] || '').trim();
      parts.push(`<tr class="item-row"
          data-content="${esc(g)}"
          data-oldcode="${esc(oc)}"
          data-newcode="${esc(nc)}"
          data-name="${esc(r['단품명칭'] || '')}">
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r['단품명칭'] || '')}">${esc(r['단품명칭'] || '')}</td>
        <td><span class="code">${esc(oc)}</span></td>
        <td style="text-align:center;color:#9ca3af">→</td>
        <td><span class="code">${esc(nc)}</span></td>
        <td style="text-align:center">${esc(r['색상'] || '')}</td>
        <td>${usageBadge(r['구사양사용구분'])}</td>
        <td style="text-align:right">${fmt(r['구현재고'])}</td>
        <td style="text-align:right">${fmt(r['구입고예정'])}</td>
        <td style="text-align:right">${fmt(r['구출고예정'])}</td>
        <td style="text-align:right">${qtyHtml(r['구가용재고'])}</td>
        <td style="text-align:right">${qtyHtml(r['구사양사업장가용재고'])}</td>
        <td>${usageBadge(r['신사양사용구분'])}</td>
        <td style="text-align:right">${fmt(r['신현재고'])}</td>
        <td style="text-align:right">${fmt(r['신입고예정'])}</td>
        <td style="text-align:right">${fmt(r['신출고예정'])}</td>
        <td style="text-align:right">${qtyHtml(r['신가용재고'])}</td>
        <td style="text-align:right">${qtyHtml(r['신사양사업장가용재고'])}</td>
        <td style="text-align:center">${docUrl ? `<a href="${esc(docUrl)}" target="_blank" rel="noopener" style="display:inline-block;padding:2px 8px;background:#EFF6FF;color:#2563eb;border-radius:4px;font-size:11px;text-decoration:none;white-space:nowrap">문서 ↗</a>` : ''}</td>
        <td style="text-align:center"><button data-oc="${esc(oc)}" data-nc="${esc(nc)}" data-color="${esc(r['색상']||'')}" onclick="handleDone_spec(this)" style="padding:2px 10px;background:#fff;border:1px solid #D1D5DB;border-radius:4px;font-size:11px;cursor:pointer;color:#6B7280">완료</button></td>
      </tr>`);
    });
  });
  document.getElementById('tableBody').innerHTML = parts.join('');
  filterTable();
}

function filterTable() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let vis = 0;
  document.querySelectorAll('#tableBody .item-row').forEach(row => {
    const m = !q || [row.dataset.content, row.dataset.oldcode, row.dataset.newcode, row.dataset.name]
      .some(s => (s || '').toLowerCase().includes(q));
    row.style.display = m ? '' : 'none';
    if (m) vis++;
  });
  document.querySelectorAll('#tableBody .group-row').forEach(gh => {
    let next = gh.nextElementSibling, hasVis = false;
    while (next && !next.classList.contains('group-row')) {
      if (next.style.display !== 'none') { hasVis = true; break; }
      next = next.nextElementSibling;
    }
    gh.style.display = hasVis ? '' : 'none';
  });
  document.getElementById('resultCount').textContent = q ? `${vis} / ${allRows.length} 건` : '';
}

loadData();
// ── 인증 ─────────────────────────────────────────────────────────
const EP_DEFAULT_IDS = ['k94rainy','wonsuk_kim','nakwon_choi'];
const LS_EP_IDS_KEY  = 'iloom_allowed_ep_ids';
const SS_USER_KEY    = 'iloom_ep_session';
function getAllowedIds(){try{const s=JSON.parse(localStorage.getItem(LS_EP_IDS_KEY)||'null');if(Array.isArray(s))return[...new Set([...EP_DEFAULT_IDS,...s])];}catch(e){}return[...EP_DEFAULT_IDS];}
function getLoggedInUser(){return sessionStorage.getItem(SS_USER_KEY)||null;}
function showLoginModal(){const saved=localStorage.getItem('iloom_saved_ep_id')||'';document.getElementById('loginInput').value=saved;const chk=document.getElementById('saveIdChk');if(chk)chk.checked=!!saved;document.getElementById('loginError').textContent='';document.getElementById('loginModal').style.display='flex';setTimeout(()=>document.getElementById('loginInput').focus(),50);}
function hideLoginModal(){document.getElementById('loginModal').style.display='none';}
function doLogin(){const v=document.getElementById('loginInput').value.trim();if(!v){document.getElementById('loginError').textContent='ID를 입력하세요.';return;}if(getAllowedIds().includes(v)){sessionStorage.setItem(SS_USER_KEY,v);const chk=document.getElementById('saveIdChk');if(chk&&chk.checked)localStorage.setItem('iloom_saved_ep_id',v);else localStorage.removeItem('iloom_saved_ep_id');hideLoginModal();updateAuthUI();}else{document.getElementById('loginError').textContent='허용되지 않은 EP ID입니다.';}}
function doLogout(){sessionStorage.removeItem(SS_USER_KEY);updateAuthUI();}
function updateAuthUI(){const user=getLoggedInUser();document.getElementById('authOverlay').style.display=user?'none':'flex';document.getElementById('btnNavLogin').style.display=user?'none':'';document.getElementById('btnNavLogout').style.display=user?'':'none';const chip=document.getElementById('navUserChip');chip.style.display=user?'':'none';chip.textContent=user?`👤 ${user}`:'';const btnSheet=document.getElementById('btnSheet');if(btnSheet)btnSheet.style.display=user?'':'none';document.querySelectorAll('.auth-hide').forEach(el=>{el.style.display=user?'':'none';});}
updateAuthUI();
</script>
